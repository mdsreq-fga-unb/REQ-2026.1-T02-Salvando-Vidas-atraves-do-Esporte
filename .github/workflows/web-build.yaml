name: Build Flutter Web and Push to Target Repo

on:
  push:
    branches: [developer]
    tags: ["v*"]

env:
  TARGET_REPO_OWNER: "JAugustoM"
  TARGET_REPO_NAME: "SalvandoVidasAtravesDoEsporteWeb"
  TARGET_BRANCH: "main"

jobs:
  push-to-target:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Clone target repository
        run: |
          git clone https://github.com/${{ env.TARGET_REPO_OWNER }}/${{ env.TARGET_REPO_NAME }}.git target-repo
          cd target-repo
          git remote set-url origin https://${{ secrets.TARGET_REPO_PAT }}@github.com/${{ env.TARGET_REPO_OWNER }}/${{ env.TARGET_REPO_NAME }}.git

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"

      - name: Build Flutter Web
        run: |
          flutter pub get
          flutter build web --wasm --release

      - name: Copy content to target repo and push
        run: |
          cp -r build/web target-repo
          cd target-repo
          git add .
          git commit -m "Update Flutter Web (commit: ${{ github.sha }})"
          git push origin ${{ env.TARGET_BRANCH }}
