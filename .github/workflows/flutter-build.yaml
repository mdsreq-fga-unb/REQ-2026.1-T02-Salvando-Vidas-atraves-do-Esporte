name: Flutter Multi-Platform Build & Release

on:
  push:
    branches: [developer]
    tags: ["v*"]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > android/app/upload-keystore.jks

      - name: Build APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: android.apk
          path: src/build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Move projeto para o disco C
        run: Move-Item -Path src -Destination C:\src

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"

      - name: Install dependencies
        working-directory: C:\src
        run: flutter pub get

      - name: Build Windows
        working-directory: C:\src
        run: flutter build windows --release

      - name: Build ISS script
        working-directory: C:\src
        run: dart run inno_bundle --no-app --no-installer

      - name: Output config into GitHub output
        working-directory: C:\src
        id: envs
        shell: bash
        run: dart run inno_bundle --envs --no-hf >> $GITHUB_OUTPUT

      - name: Build installer
        working-directory: C:\src
        run: iscc build\windows\x64\installer\Release\inno-script.iss

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows.exe
          path: C:\src\build\windows\x64\installer\Release\${{ steps.envs.outputs.APP_NAME_CAMEL_CASE }}-x86_64-${{ steps.envs.outputs.APP_VERSION }}-Installer.exe

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    permissions:
      contents: write

    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.apk
            release-artifacts/*.exe
          generate_release_notes: true
